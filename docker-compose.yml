version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src/data:/app/src/data
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./src/data:/app/src/data
    environment:
      - SENTINEL_API_URL=http://api:8000
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api